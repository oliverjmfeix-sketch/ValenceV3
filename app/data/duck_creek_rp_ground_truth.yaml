  source_page: 192
  source_text: "unlimited additional Dividends; provided that on a Pro Forma Basis, the First Lien Leverage Ratio for the applicable Test Period as of the Applicable Date of Determination shall be no greater than the greater of (x) 5.75 to 1.00 and (y) the First Lien Leverage Ratio (determined without giving effect to the Subject Transactions on a Pro Forma Basis) for the most recently ended Test Period prior to the Applicable Date of Determination; provided further that any Limited Condition Transaction remains subject to the terms of Section 1.06 hereof"
