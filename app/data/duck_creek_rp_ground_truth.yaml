  source_section: "6.06(j)"
  source_page: 190
  source_text: "additional Dividends may be made, directly or indirectly, by any Group Member to Holdings and/or (without duplication) Holdings' direct or indirect equity holders in an aggregate amount not to exceed the greater of $130,000,000 and 100% of Consolidated EBITDA for the most recently ended Test Period, less, for the avoidance of doubt, the aggregate amount reallocated by the Borrowers pursuant to Section 6.01(r), Section 6.01(x), Section 6.02(x) (without duplication of any amounts reallocated to Section 6.01(x)), Section 6.03(y), or Section 6.09(a)(I) plus (A) the aggregate total of all other amounts available to be utilized for Restricted Debt Payments pursuant to Section 6.09(a) ... plus (B) the aggregate total of all other amounts available to be utilized for Investments pursuant to Section 6.03(y), which the Borrowers may, from time to time, in the case of (A) and (B), elect to reallocate to the making of Dividends pursuant to this Section 6.06(j)"
