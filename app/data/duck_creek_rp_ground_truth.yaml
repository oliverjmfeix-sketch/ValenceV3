  norm_kind: management_equity_carryforward
  modality: permission
  capacity_composition: additive
  action_scope: specific
  subject_role: [borrower, loan_party]
  scoped_actions: [repurchase_equity]
  scoped_objects: [equity_interest, holdco_equity]
  cap_usd: 20_000_000
  cap_grower_pct: 15.0
  cap_grower_reference: "consolidated_ebitda_ltm"
  cap_uses_greater_of: true
  source_section: "6.06(b)(i)(x) carryforward proviso"
  source_page: 189
  source_text: "provided, that such amount may be increased by (x) up to $20,000,000 or, if greater, 15% of Consolidated EBITDA (or, following the consummation of an IPO, the greater of $40,000,000 and 30% of Consolidated EBITDA for the most recently ended Test Period) for each applicable fiscal year, solely to the extent the amount available under this clause (i) was not utilized in any preceding fiscal years"
