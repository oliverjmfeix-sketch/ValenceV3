# ─────────────────────────────────────────────────────────────────────────────
# Upstream precondition — J.Crew blocker on Unsub designation
# ─────────────────────────────────────────────────────────────────────────────

- norm_id: dc_rp_jcrew_blocker_unsub_designation
  norm_kind: jcrew_blocker_condition
  modality: permission
  # J.Crew blocker encoded as a permission on designate_unrestricted_subsidiary
  # conditioned on the positive predicate "designation excludes material IP."
  # Rationale (judgment call per Prompt 05 report): the operative text
  # structures this as "no Restricted Subsidiary may be designated as an
  # Unrestricted Subsidiary if... [owns material IP]." The natural positive
  # framing is: designation is permitted when the IP-exclusion predicate
  # holds. Modelled as permission + atomic positive condition per prompt §
  # "upstream_precondition" guidance.
  capacity_composition: n_a
  action_scope: specific
  subject_role: [borrower, loan_party]
  scoped_actions: [designate_unrestricted_subsidiary]
  scoped_objects: [unrestricted_subsidiary_equity_or_assets]
  cap_usd: null
  cap_grower_pct: null
  source_section: "Definition of 'Unrestricted Subsidiary' / designation mechanics"
  source_page: <page_unknown>       # approximately p.83 per audit, human verification required
  source_text: "no Restricted Subsidiary may be designated as an Unrestricted Subsidiary if, immediately after giving effect to such designation, such Unrestricted Subsidiary would own or have an exclusive license (from Holdings or its Restricted Subsidiaries) at the time of such designation to any Material Intellectual Property."
  question_role: upstream_precondition
  serves_questions: [duck_creek_q2, duck_creek_rp_q9]
  condition:
    type: atomic
    predicate: designation_excludes_material_ip_from_unsub

