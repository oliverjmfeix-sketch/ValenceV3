# ═══════════════════════════════════════════════════════════════════════════════
# ASSET SALE PATHWAYS — §6.05(z), §2.10(c) — feed Retained Asset Sale Proceeds
# ═══════════════════════════════════════════════════════════════════════════════

- norm_id: dc_rp_6_05_z_unlimited_asset_sale_basket
  norm_kind: unlimited_asset_sale_basket_permission
  modality: permission
  capacity_composition: unlimited_on_condition
  action_scope: specific
  subject_role: [borrower, loan_party]
  scoped_actions: [make_investment]   # asset sale proceeds reinvested; ultimate RP flow via Retained ASP → builder
  scoped_objects: [cash]
  cap_usd: null
  cap_grower_pct: null
  source_section: "6.05(z)"
  source_page: <page_unknown>
  source_text: "<operative-text verification required; 6.05(z) permits Asset Sale when First Lien Leverage Ratio ≤ greater of 6.00x and pre-transaction ratio (no-worse)>"
  question_role: primary
  serves_questions: [duck_creek_q4, duck_creek_rp_q8]
  condition:
    type: OR
    children:
      - type: atomic
        predicate: first_lien_net_leverage_at_or_below
        threshold_value_double: 6.00
        operator_comparison: at_or_below
      - type: atomic
        predicate: pro_forma_no_worse
        reference_predicate_label: first_lien_net_leverage

- norm_id: dc_rp_2_10_c_iv_product_line_sweep_exemption
  norm_kind: sweep_exemption_product_line
  modality: permission
  # Strategy A FLATTENED per Convention 4. Pre-flattening depth-3 tree:
  #   AND(is_product_line_or_line_of_business_sale,
  #       OR(first_lien_ratio_at_or_below(6.25), pro_forma_no_worse(first_lien)))
  # Post-flattening depth-2 disjunction of conjunctions — see condition below.
  capacity_composition: unlimited_on_condition
  action_scope: specific
  subject_role: [borrower, loan_party]
  scoped_actions: [make_investment]   # exemption prevents sweep → retained → builder
  scoped_objects: [cash]
  cap_usd: null
  cap_grower_pct: null
  source_section: "2.10(c)(iv)"
  source_page: 106                   # confirmed from extracted Section 2.10 text
  source_text: "no such prepayment shall be required under this clause (c) with respect to any Net Cash Proceeds of any Asset Sale if (A) such Asset Sale is a disposition of all or substantially all of a product line or line of business identified by the Borrowers to the Administrative Agent from time to time, and (B) the First Lien Leverage Ratio computed on a Pro Forma Basis... is less than or equal to the greater of (x) 6.25 to 1.00 and (y) the First Lien Leverage Ratio for the most recently ended Test Period (determined without giving effect to the Subject Transactions on a Pro Forma Basis) as of the Applicable Date of Determination."
  question_role: primary
  serves_questions: [duck_creek_q4, duck_creek_rp_q8]
  condition:
    type: OR
    children:
      - type: AND
        children:
          - type: atomic
            predicate: is_product_line_or_line_of_business_sale
          - type: atomic
            predicate: first_lien_net_leverage_at_or_below
            threshold_value_double: 6.25
            operator_comparison: at_or_below
      - type: AND
        children:
          - type: atomic
            predicate: is_product_line_or_line_of_business_sale
          - type: atomic
            predicate: pro_forma_no_worse
            reference_predicate_label: first_lien_net_leverage

- norm_id: dc_rp_2_10_c_i_de_minimis_exemption
  norm_kind: sweep_exemption_de_minimis
  modality: permission
  capacity_composition: unlimited_on_condition
  action_scope: specific
  subject_role: [borrower, loan_party]
  scoped_actions: [make_investment]
  scoped_objects: [cash]
  cap_usd: null
  cap_grower_pct: null
  source_section: "2.10(c)(i)"
  source_page: 105                   # confirmed from extracted Section 2.10 text
  source_text: "no such prepayment shall be required under this clause (c)... to the extent either (or both) (x) the Prepayable Net Cash Proceeds of such Asset Sale do not exceed the greater of (1) $20,000,000 and (2) 15% of Consolidated EBITDA for the applicable Test Period (the 'Individual Asset Sale Threshold') and/or (y) the aggregate Prepayable Net Cash Proceeds for all such Asset Sales that exceed the Individual Asset Sale Threshold in such fiscal year do not exceed the Annual Asset Sale Threshold"
  question_role: primary
  serves_questions: [duck_creek_q4, duck_creek_rp_q8]
  condition:
    type: OR
    children:
      - type: atomic
        predicate: individual_proceeds_at_or_below
        threshold_value_double: 20_000_000
        threshold_value_string: "greater_of(20_000_000, 15% EBITDA)"
        operator_comparison: at_or_below
      - type: atomic
        predicate: annual_aggregate_at_or_below
        threshold_value_double: 40_000_000
        threshold_value_string: "greater_of(40_000_000, 30% EBITDA)"
        operator_comparison: at_or_below

- norm_id: dc_rp_sweep_tier_100pct
  norm_kind: sweep_tier
  modality: obligation
  # Obligation: the borrower MUST sweep 100% of Net Cash Proceeds when ratio > 5.75x.
  # Violation consequent: mandatory prepayment of Term Loans (§2.10(h), (i))
  capacity_composition: n_a
  action_scope: specific
  subject_role: [borrower]
  scoped_actions: [pay_subordinated_debt]   # sweep proceeds repay Term Loans
  scoped_objects: [cash]
  cap_usd: null
  cap_grower_pct: null
  sweep_percentage: 100
  source_section: "Definition of 'Applicable Net Cash Proceeds Percentage', clause (a)"
  source_page: <page_unknown>
  source_text: "<operative-text verification required; clause (a) of Applicable Net Cash Proceeds Percentage — 100% sweep when First Lien Leverage Ratio exceeds 5.75x>"
  question_role: primary
  serves_questions: [duck_creek_q4, duck_creek_rp_q8]
  condition:
    type: atomic
    predicate: first_lien_net_leverage_above
    threshold_value_double: 5.75
    operator_comparison: greater_than

- norm_id: dc_rp_sweep_tier_50pct
  norm_kind: sweep_tier
  modality: obligation
  capacity_composition: n_a
  action_scope: specific
  subject_role: [borrower]
  scoped_actions: [pay_subordinated_debt]
  scoped_objects: [cash]
  cap_usd: null
  cap_grower_pct: null
  sweep_percentage: 50
  source_section: "Definition of 'Applicable Net Cash Proceeds Percentage', clause (b)"
  source_page: <page_unknown>
  source_text: "<operative-text verification required; clause (b) — 50% sweep when First Lien Leverage Ratio is in (5.50x, 5.75x] band>"
  question_role: primary
  serves_questions: [duck_creek_q4, duck_creek_rp_q8]
  condition:
    type: AND
    children:
      - type: atomic
        predicate: first_lien_net_leverage_above
        threshold_value_double: 5.50
        operator_comparison: greater_than
      - type: atomic
        predicate: first_lien_net_leverage_at_or_below
        threshold_value_double: 5.75
        operator_comparison: at_or_below

- norm_id: dc_rp_sweep_tier_0pct
  norm_kind: sweep_tier
  modality: obligation
  capacity_composition: n_a
  action_scope: specific
  subject_role: [borrower]
  scoped_actions: [pay_subordinated_debt]
  scoped_objects: [cash]
  cap_usd: null
  cap_grower_pct: null
  sweep_percentage: 0
  source_section: "Definition of 'Applicable Net Cash Proceeds Percentage', clause (c)"
  source_page: <page_unknown>
  source_text: "<operative-text verification required; clause (c) — 0% sweep (full retention) when First Lien Leverage Ratio ≤ 5.50x>"
  question_role: primary
  serves_questions: [duck_creek_q4, duck_creek_rp_q8]
  condition:
    type: atomic
    predicate: first_lien_net_leverage_at_or_below
    threshold_value_double: 5.50
    operator_comparison: at_or_below

