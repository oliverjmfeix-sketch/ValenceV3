# Duck Creek RP Ground Truth
#
# CONVENTION: norm_id suffixes are internal labels, not clause citations.
# Example: `6e76ed06_cash_equity_funded_rp_permission` refers to the agreement's
# 6.06(i) (cash-equity-funded dividends), not 6.06(e). The `source_section`
# attribute is the authoritative citation; norm_ids are stable identifiers
# preserved across clause-letter corrections for backwards compatibility
# with cross-references (`contributes_to_norm_id`, `serves_questions`, etc.).
#
# If you need to know which clause a norm actually maps to, read
# `source_section`, not the norm_id suffix.
#
# History: clause-letter corrections landed per Option A from
# docs/v4_source_verification_findings.md (commit follows this file's edit).
#
# ═══════════════════════════════════════════════════════════════════════════════
# Duck Creek RP Ground Truth — v4 Pilot Baseline
#
# Source: DISCO PARENT, INC. credit agreement (posting version 7/30/25)
# Audit basis: docs/v4_known_gaps.md, commit 8b1cdb3
# Serves: app/data/gold_standard/lawyer_dc_rp.json (6 questions) and
#         app/data/gold_standard/xtract_dc_rp_mfn.json (22 questions; RP subset Q1-Q12)
#
# Conventions (per Prompt 05):
#   1. Multi-norm questions — see question_role field
#   2. Full source enumeration — Cumulative Amount clauses (a)-(m) all encoded
#   3. Clean predicate labels — thresholds as instance attributes (§4.5.1)
#   4. Strategy A flattening — applied to Section 2.10(c)(iv) (depth-3) only
#
# Page numbers marked <page_unknown> where operative text access was limited
# during authoring. Section 2.10 text verified from extracted operative text
# (Downloads/Duck_Creek_Section_2_10.txt); other sections cited by section
# number but not page. Human verification of page numbers required before
# Prompt 06 projection work anchors on them.
