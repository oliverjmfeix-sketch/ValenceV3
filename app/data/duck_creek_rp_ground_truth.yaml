- norm_id: 6e76ed06_parent_fund_distribution_permission
  norm_kind: parent_fund_distribution_permission
  modality: permission
  # Per Prompt 06 judgment: modeled as a single parent norm with sub_clauses
  # annotation rather than four separate norms. Operations layer reads sub_clauses
  # to cite specific sub-clause when rendering. Cleaner than four near-identical
  # norms; easier to read. Flag if granular per-sub-clause citations are needed.
  capacity_composition: categorical
  action_scope: specific
  subject_role: [borrower]
  scoped_actions: [make_dividend_payment]
  scoped_objects: [cash, equity_interest]
  cap_usd: null
  cap_grower_pct: null
  sub_clauses:
    - sub_ref: "6.06(m)(i)"
      description: "to finance any Investment permitted to be made pursuant to Section 6.03; provided that (A) such Dividend shall be made substantially concurrently with the closing of such Investment and (B) Holdings or such parent, as applicable, shall, immediately following the closing thereof, cause (1) all property so acquired (whether assets or Equity Interests) to be held by or contributed to any Restricted Subsidiary or (2) the merger or amalgamation (to the extent permitted in Section 6.04) of the Person formed or acquired into any Restricted Subsidiary in order to consummate such Permitted Acquisition"
    - sub_ref: "6.06(m)(ii)"
      description: "the proceeds of which shall be used to pay customary costs, fees and expenses (other than to Affiliates) related to an IPO (whether or not consummated) or any successful or unsuccessful equity or debt offering, debt incurrence, Investment (including, for the avoidance of doubt, any Permitted Acquisition) or other transaction, in each case, to the extent not prohibited by this Agreement"
